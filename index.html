<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Keratoconus Optical Simulator v2.1</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#121212;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:16px;
}

h1{
    margin:12px 0 4px;
    font-size:24px;
    text-align:center;
}

h2{
    font-size:14px;
    font-weight:normal;
    color:#aaa;
    margin-bottom:18px;
    text-align:center;
}

#container{
    position:relative;
    width:100%;
    max-width:720px;
    border-radius:14px;
    overflow:hidden;
    background:#000;
}

video{
    width:100%;
    display:block;
}

canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    mix-blend-mode:screen;
}

button{
    margin-top:18px;
    padding:14px 24px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:disabled{
    background:#555;
    cursor:default;
}

.controls{
    width:100%;
    max-width:720px;
    margin-top:20px;
}

.control{
    margin-bottom:18px;
}

label{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-size:15px;
}

input[type=range]{
    width:100%;
}
</style>
</head>

<body>

<h1>Keratoconus Optical Simulator v2.1</h1>
<h2>Aberración de Coma Asimétrica Inferior</h2>

<div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
</div>

<button id="startBtn">📷 Abrir cámara</button>

<div class="controls">

    <div class="control">
        <label>
            <span>Desplazamiento Vertical (Coma)</span>
            <span id="offsetValue">35 px</span>
        </label>
        <input id="offset" type="range" min="0" max="80" value="35">
    </div>

    <div class="control">
        <label>
            <span>Opacidad del Fantasma</span>
            <span id="opacityValue">45%</span>
        </label>
        <input id="opacity" type="range" min="0" max="100" value="45">
    </div>

</div>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("overlay");
const ctx=canvas.getContext("2d");

// Canvas auxiliar en memoria para realizar el procesamiento de la aberración sin alterar el renderizado principal
const tempCanvas = document.createElement("canvas");
const tempCtx = tempCanvas.getContext("2d");

const offset=document.getElementById("offset");
const opacity=document.getElementById("opacity");

const offsetValue=document.getElementById("offsetValue");
const opacityValue=document.getElementById("opacityValue");

const startBtn=document.getElementById("startBtn");

offset.addEventListener("input",()=>{
    offsetValue.textContent=offset.value+" px";
});

opacity.addEventListener("input",()=>{
    opacityValue.textContent=opacity.value+"%";
});

async function startCamera(){

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        alert("Este navegador no soporta acceso a la cámara.");
        return;
    }

    try{

        const stream=await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            },
            audio:false
        });

        video.srcObject=stream;

        startBtn.disabled=true;
        startBtn.textContent="✅ Cámara iniciada";

    }catch(e){

        console.error(e);

        alert(
            "No fue posible acceder a la cámara.\n\n" +
            "Error: " + e.name + "\n\n" +
            "Si abriste este archivo desde Descargas, subilo a un sitio HTTPS (por ejemplo GitHub Pages) o ejecutalo desde un servidor local."
        );
    }
}

startBtn.addEventListener("click",startCamera);

video.addEventListener("loadedmetadata",()=>{

    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    
    tempCanvas.width=video.videoWidth;
    tempCanvas.height=video.videoHeight;

    render();

});

function render(){

    requestAnimationFrame(render);

    if(video.readyState<2) return;

    // Limpieza de capas
    ctx.clearRect(0,0,canvas.width,canvas.height);
    tempCtx.clearRect(0,0,tempCanvas.width,tempCanvas.height);

    const w=canvas.width;
    const h=canvas.height;
    const maxOffset = Number(offset.value);

    // 1. Renderizar el efecto de Coma (cola de cometa vertical hacia arriba) en el lienzo temporal
    tempCtx.save();
    tempCtx.filter = "blur(12px)";
    
    const steps = 6;
    for (let i = 1; i <= steps; i++) {
        const factor = i / steps;
        // Simula la dispersión asimétrica del haz de luz
        tempCtx.globalAlpha = (1 - factor * 0.4) / steps;
        
        tempCtx.drawImage(
            video, 
            0, 0, w, h, 
            0, -(maxOffset * factor), w, h
        );
    }
    tempCtx.restore();

    // 2. Mezclar el efecto óptico en el canvas principal aplicando la máscara corneal inferior
    ctx.save();
    
    // Dibujamos la aberración procesada
    ctx.drawImage(tempCanvas, 0, 0);

    // Aplicamos el gradiente para eliminar cortes horizontales (el cono inicia sutilmente en el centro y se intensifica abajo)
    ctx.globalCompositeOperation = 'destination-in';
    
    const gradient = ctx.createLinearGradient(0, h * 0.35, 0, h);
    gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
    gradient.addColorStop(0.4, 'rgba(0, 0, 0, 0.3)');
    gradient.addColorStop(1, 'rgba(0, 0, 0, 1)');
    
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
    
    ctx.restore();

    // 3. Aplicar opacidad general controlada por el usuario sobre el resultado final de la mezcla screen
    ctx.save();
    ctx.globalAlpha = opacity.value / 100;
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
}

</script>

</body>
</html>
