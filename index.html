<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Keratoconus Optical Simulator v2.3</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#121212;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:16px;
}

h1{
    margin:12px 0 4px;
    font-size:24px;
    text-align:center;
}

h2{
    font-size:14px;
    font-weight:normal;
    color:#aaa;
    margin-bottom:18px;
    text-align:center;
}

#container{
    position:relative;
    width:100%;
    max-width:720px;
    border-radius:14px;
    overflow:hidden;
    background:#000;
}

video{
    width:100%;
    display:block;
}

canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    mix-blend-mode:screen;
}

button{
    margin-top:18px;
    padding:14px 24px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:disabled{
    background:#555;
    cursor:default;
}

.controls{
    width:100%;
    max-width:720px;
    margin-top:20px;
}

.control{
    margin-bottom:18px;
}

label{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-size:15px;
}

input[type=range]{
    width:100%;
}
</style>
</head>

<body>

<h1>Keratoconus Optical Simulator v2.3</h1>
<h2>Aberración de Coma Asimétrica Inferior</h2>

<div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
</div>

<button id="startBtn">📷 Abrir cámara</button>

<div class="controls">

    <div class="control">
        <label>
            <span>Desplazamiento Vertical (Coma)</span>
            <span id="offsetValue">35 px</span>
        </label>
        <input id="offset" type="range" min="0" max="80" value="35">
    </div>

    <div class="control">
        <label>
            <span>Opacidad del Fantasma</span>
            <span id="opacityValue">45%</span>
        </label>
        <input id="opacity" type="range" min="0" max="100" value="45">
    </div>

</div>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("overlay");
const ctx=canvas.getContext("2d");

// Buffer en memoria independiente para construir la aberración de coma de forma segura
const bufferCanvas = document.createElement("canvas");
const bufferCtx = bufferCanvas.getContext("2d");

const offset=document.getElementById("offset");
const opacity=document.getElementById("opacity");

const offsetValue=document.getElementById("offsetValue");
const opacityValue=document.getElementById("opacityValue");

const startBtn=document.getElementById("startBtn");

offset.addEventListener("input",()=>{
    offsetValue.textContent=offset.value+" px";
});

opacity.addEventListener("input",()=>{
    opacityValue.textContent=opacity.value+"%";
});

async function startCamera(){

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        alert("Este navegador no soporta acceso a la cámara.");
        return;
    }

    try{

        const stream=await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            },
            audio:false
        });

        video.srcObject=stream;

        startBtn.disabled=true;
        startBtn.textContent="✅ Cámara iniciada";

    }catch(e){

        console.error(e);

        alert(
            "No fue posible acceder a la cámara.\n\n" +
            "Error: " + e.name + "\n\n" +
            "Si abriste este archivo desde Descargas, subilo a un sitio HTTPS (por ejemplo GitHub Pages) o ejecutalo desde un servidor local."
        );
    }
}

startBtn.addEventListener("click",startCamera);

video.addEventListener("loadedmetadata",()=>{
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    
    // Sincronizar dimensiones del buffer
    bufferCanvas.width=video.videoWidth;
    bufferCanvas.height=video.videoHeight;
    
    render();
});

function render(){

    requestAnimationFrame(render);

    if(video.readyState < 2) return;

    const w = canvas.width;
    const h = canvas.height;
    const maxOffset = Number(offset.value);
    const userOpacity = Number(opacity.value) / 100;

    // Limpieza estricta de ambos lienzos en cada frame
    ctx.clearRect(0, 0, w, h);
    bufferCtx.clearRect(0, 0, w, h);

    if (userOpacity === 0 || maxOffset === 0) return;

    // --- PASO 1: Construir la cola de cometa en el Buffer Oculto ---
    bufferCtx.save();
    bufferCtx.filter = "blur(12px)";

    const steps = 6;
    for (let i = 1; i <= steps; i++) {
        const factor = i / steps;
        const currentOffset = maxOffset * factor;
        
        // Distribución asimétrica de la energía lumínica degradándose hacia la punta del cometa
        bufferCtx.globalAlpha = (1 - factor * 0.4) / steps;
        
        bufferCtx.drawImage(
            video, 
            0, 0, w, h, 
            0, -currentOffset, w, h
        );
    }
    bufferCtx.restore();

    // --- PASO 2: Trasladar la aberración al Canvas Principal aplicando la máscara cónica ---
    ctx.save();
    
    // Primero dibujamos la distorsión completa acumulada en el buffer
    ctx.drawImage(bufferCanvas, 0, 0);

    // Cambiamos el modo de fusión para recortar suavemente de forma vertical
    ctx.globalCompositeOperation = 'destination-in';
    
    // Gradiente lineal anatómico: 0% de efecto arriba del centro óptico, incremento progresivo hacia la base inferior
    const gradient = ctx.createLinearGradient(0, h * 0.35, 0, h);
    gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
    gradient.addColorStop(0.4, `rgba(0, 0, 0, ${userOpacity * 0.3})`);
    gradient.addColorStop(1, `rgba(0, 0, 0, ${userOpacity})`);
    
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);
    
    ctx.restore();
}

</script>

</body>
</html>
