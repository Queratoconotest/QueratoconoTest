<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Keratoconus Optical Simulator v2.0</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#121212;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:16px;
}

h1{
    margin:12px 0 4px;
    font-size:24px;
    text-align:center;
}

h2{
    font-size:14px;
    font-weight:normal;
    color:#aaa;
    margin-bottom:18px;
    text-align:center;
}

#container{
    position:relative;
    width:100%;
    max-width:720px;
    border-radius:14px;
    overflow:hidden;
    background:#000;
}

video{
    width:100%;
    display:block;
}

canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    mix-blend-mode:screen;
}

button{
    margin-top:18px;
    padding:14px 24px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:disabled{
    background:#555;
    cursor:default;
}

.controls{
    width:100%;
    max-width:720px;
    margin-top:20px;
}

.control{
    margin-bottom:18px;
}

label{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-size:15px;
}

input[type=range]{
    width:100%;
}
</style>
</head>

<body>

<h1>Keratoconus Optical Simulator v2.0</h1>
<h2>Aberración de Coma Asimétrica Inferior</h2>

<div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
</div>

<button id="startBtn">📷 Abrir cámara</button>

<div class="controls">

    <div class="control">
        <label>
            <span>Desplazamiento Vertical (Coma)</span>
            <span id="offsetValue">35 px</span>
        </label>
        <input id="offset" type="range" min="0" max="80" value="35">
    </div>

    <div class="control">
        <label>
            <span>Opacidad del Fantasma</span>
            <span id="opacityValue">45%</span>
        </label>
        <input id="opacity" type="range" min="0" max="100" value="45">
    </div>

</div>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("overlay");
const ctx=canvas.getContext("2d");

const offset=document.getElementById("offset");
const opacity=document.getElementById("opacity");

const offsetValue=document.getElementById("offsetValue");
const opacityValue=document.getElementById("opacityValue");

const startBtn=document.getElementById("startBtn");

offset.addEventListener("input",()=>{
    offsetValue.textContent=offset.value+" px";
});

opacity.addEventListener("input",()=>{
    opacityValue.textContent=opacity.value+"%";
});

async function startCamera(){

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        alert("Este navegador no soporta acceso a la cámara.");
        return;
    }

    try{

        const stream=await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            },
            audio:false
        });

        video.srcObject=stream;

        startBtn.disabled=true;
        startBtn.textContent="✅ Cámara iniciada";

    }catch(e){

        console.error(e);

        alert(
            "No fue posible acceder a la cámara.\n\n" +
            "Error: " + e.name + "\n\n" +
            "Si abriste este archivo desde Descargas, subilo a un sitio HTTPS (por ejemplo GitHub Pages) o ejecutalo desde un servidor local."
        );
    }
}

startBtn.addEventListener("click",startCamera);

video.addEventListener("loadedmetadata",()=>{

    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;

    render();

});

function render(){

    requestAnimationFrame(render);

    if(video.readyState<2) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const w=canvas.width;
    const h=canvas.height;

    // Duplicación progresiva y asimétrica para simular la aberración de coma corneal inferior
    ctx.save();
    
    // Configuración óptica inicial del clon monocular
    ctx.filter="blur(12px)";
    ctx.globalAlpha=opacity.value/100;

    // Máscara de gradiente lineal para eliminar cortes artificiales e integrar el cono corneal de forma anatómica
    // El cono ectásico comienza sutilmente en el centro del eje visual y se intensifica en el sector inferior
    const gradient = ctx.createLinearGradient(0, h * 0.4, 0, h);
    gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
    gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.4)');
    gradient.addColorStop(1, 'rgba(255, 255, 255, 1)');
    
    ctx.fillStyle = gradient;

    // Muestreo dinámico multipaso para estirar la imagen verticalmente imitando la "cola de cometa" de la aberración de coma
    const steps = 8;
    const maxOffset = Number(offset.value);

    for (let i = 1; i <= steps; i++) {
        const factor = i / steps;
        const currentOffset = maxOffset * factor;
        
        // La opacidad decae exponencialmente hacia la punta de la aberración vertical (hacia arriba)
        ctx.globalAlpha = (opacity.value / 100) * (1 - factor * 0.5) / steps;
        
        ctx.save();
        // Aplicar la máscara de degradado anatómico
        ctx.beginPath();
        ctx.rect(0, 0, w, h);
        ctx.clip();
        
        ctx.globalCompositeOperation = 'source-over';
        
        // Estiramiento y desplazamiento asimétrico de la mitad inferior hacia la zona superior del campo visual
        ctx.drawImage(
            video,
            0, 0, w, h,
            0, -currentOffset, w, h + currentOffset
        );
        ctx.restore();
    }

    // Aplicación final del degradado de intensidad sobre el canvas procesado
    ctx.globalCompositeOperation = 'destination-in';
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);

    ctx.restore();

}

</script>

</body>
</html>
